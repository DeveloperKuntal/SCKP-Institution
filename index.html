<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>SCKP Institution</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<!-- IMAGE SLIDER -->

<div class="slider">

<img src="images/photo1.jpg" class="slide active">
<img src="images/photo2.jpg" class="slide">
<img src="images/photo3.jpg" class="slide">

</div>



<!-- DARK OVERLAY -->

<div id="overlay"></div>



<!-- ADMISSION POPUP -->

<div id="admissionPopup">

<span class="closeBtn" onclick="minimizePopup()">✖</span>

<h2>Admission Form</h2>

<input type="text" placeholder="Student Name">

<input type="tel" placeholder="Phone Number">

<input type="text" placeholder="Class">

<button>Submit</button>

</div>



<!-- MINIMIZED BUTTON -->

<div id="popupButton" onclick="openPopup()">
Admission Form
</div>



<script src="script.js"></script>

</body>
</html>
