<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SCKP Institution</title>

<link rel="stylesheet" href="style.css">

</head>

<body>



<header>

<h2>SCKP Institution</h2>

</header>



<section class="hero">

<h1>Build Your Academic Future</h1>

<p>Best coaching institute in Naharpada, Baripada.</p>

</section>



<!-- ADMISSION POPUP -->

<div id="popupForm" class="popup">

<div class="popup-content">

<span class="close-btn" onclick="minimizeForm()">×</span>

<h2>Admission Enquiry</h2>

<form>

<input type="text" placeholder="Student Name" required>

<input type="text" placeholder="Class" required>

<input type="tel" placeholder="Phone Number" required>

<button type="submit">Submit</button>

</form>

</div>

</div>



<!-- FLOATING BUTTON -->

<button id="openFormBtn" onclick="openForm()">Admission</button>



<script>

window.onload = function(){
document.getElementById("popupForm").style.display="flex";
}



function minimizeForm(){

document.getElementById("popupForm").style.display="none";

document.getElementById("openFormBtn").style.display="block";

}



function openForm(){

document.getElementById("popupForm").style.display="flex";

document.getElementById("openFormBtn").style.display="none";

}

</script>



</body>
</html>
